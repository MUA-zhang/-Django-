<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Django 示例</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: #172033;
      background: #f6f8fb;
    }

    main {
      width: min(640px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid #d9e2ef;
      border-radius: 8px;
      background: #ffffff;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <h1>你好，Django</h1>
    <p>这是一个最小示例项目，可以作为后续开发的起点。</p>
  </main>
</body>
</html>
